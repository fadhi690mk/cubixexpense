{% extends 'base.html' %}

{% block title %}Password Reset Complete - Cubixmet Expense{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card" style="width: 100%; max-width: 500px;">
        <div class="card-body p-5">
            <div class="text-center">
                <div style="font-size: 3rem; color: #28a745; margin-bottom: 1rem;">
                    <i class="bi bi-check-circle"></i>
                </div>
                <h1 class="h3 mb-3" style="color: #021838; font-weight: 700;">Password Reset Complete</h1>
                <p class="text-muted mb-4">Your password has been successfully reset.</p>
                
                <div class="alert alert-success" role="alert">
                    <i class="bi bi-info-circle"></i> You can now log in with your new password.
                </div>

                <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right"></i> Go to Login
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
</style>
{% endblock %}
